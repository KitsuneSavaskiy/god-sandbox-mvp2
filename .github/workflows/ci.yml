name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "package.json not found yet. Skipping install for bootstrap commit."
          fi

      - name: Typecheck
        run: |
          if [ -f package.json ] && npm run | grep -q "typecheck"; then
            npm run typecheck
          else
            echo "No typecheck script yet."
          fi

      - name: Domain tests
        run: |
          if [ -f package.json ] && npm run | grep -q "test:domain"; then
            npm run test:domain
          else
            echo "No test:domain script yet."
          fi

      - name: Lint
        run: |
          if [ -f package.json ] && npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script yet."
          fi

      - name: Build
        run: |
          if [ -f package.json ] && npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script yet."
          fi
