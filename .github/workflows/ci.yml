name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "package.json not found yet. Skipping install for bootstrap commit."
          fi

      - name: Git boundary check
        run: |
          if [ -f package.json ] && npm run | grep -q "security:git-boundary"; then
            npm run security:git-boundary
          else
            echo "No security:git-boundary script yet."
          fi

      - name: PR text boundary check
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -f tools/security/check-pr-text-boundary.mjs ]; then
            node tools/security/check-pr-text-boundary.mjs
          else
            echo "No check-pr-text-boundary.mjs yet."
          fi

      - name: Typecheck
        run: |
          if [ -f package.json ] && npm run | grep -q "typecheck"; then
            npm run typecheck
          else
            echo "No typecheck script yet."
          fi

      - name: Domain tests
        run: |
          if [ -f package.json ] && npm run | grep -q "test:domain"; then
            npm run test:domain
          else
            echo "No test:domain script yet."
          fi

      - name: AI tests
        run: |
          if [ -f package.json ] && npm run | grep -q "test:ai"; then
            npm run test:ai
          else
            echo "No test:ai script yet."
          fi

      - name: Lint
        run: |
          if [ -f package.json ] && npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script yet."
          fi

      - name: Build
        run: |
          if [ -f package.json ] && npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script yet."
          fi

      - name: Trigger and verify Cloudflare deployment
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
          CLOUDFLARE_PRODUCTION_URL: ${{ vars.CLOUDFLARE_PRODUCTION_URL || secrets.CLOUDFLARE_PRODUCTION_URL || 'https://god-sandbox-mvp2.devel-playground.workers.dev/' }}
        run: |
          set -euo pipefail

          if [ -z "$CLOUDFLARE_DEPLOY_HOOK_URL" ]; then
            echo "CLOUDFLARE_DEPLOY_HOOK_URL secret is not set. Please add it in repository settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_PRODUCTION_URL" ]; then
            echo "CLOUDFLARE_PRODUCTION_URL is not set."
            exit 1
          fi

          expected_js=$(find dist/assets -maxdepth 1 -type f -name 'index-*.js' -printf '%f\n' | sort | head -n 1)
          expected_css=$(find dist/assets -maxdepth 1 -type f -name 'index-*.css' -printf '%f\n' | sort | head -n 1)
          if [ -z "$expected_js" ] || [ -z "$expected_css" ]; then
            echo "Could not find built Vite assets under dist/assets."
            exit 1
          fi
          production_url="${CLOUDFLARE_PRODUCTION_URL%/}"
          echo "Expecting production HTML to reference /assets/$expected_js and /assets/$expected_css"

          if ! response=$(curl --silent --show-error --fail --max-time 30 -X POST "$CLOUDFLARE_DEPLOY_HOOK_URL"); then
            echo "Cloudflare deploy hook request failed (timeout/network/non-2xx)."
            exit 1
          fi
          echo "$response"
          build_uuid=$(RESPONSE="$response" node <<'NODE'
          let payload;
          try {
            payload = JSON.parse(process.env.RESPONSE ?? "{}");
          } catch {
            console.error("Failed to parse deploy hook response as JSON.");
            console.error(process.env.RESPONSE ?? "");
            process.exit(1);
          }

          if (payload.success !== true) {
            console.error("Cloudflare deploy hook did not report success=true. Response:");
            console.error(JSON.stringify(payload));
            console.error("Check Cloudflare Workers build/deploy logs for this hook.");
            process.exit(1);
          }
          const buildUuid = payload.result?.build_uuid;
          if (typeof buildUuid !== "string" || buildUuid.length === 0) {
            console.error("Cloudflare deploy hook response did not include result.build_uuid.");
            console.error(JSON.stringify(payload));
            process.exit(1);
          }
          console.log(buildUuid);
          NODE
          )
          echo "Cloudflare queued build: $build_uuid"

          for attempt in $(seq 1 36); do
            verify_url="$production_url/?deploy-verify=${GITHUB_SHA}-${attempt}-$(date +%s)"
            html=$(curl --silent --show-error --fail --max-time 30 -H "Cache-Control: no-cache" "$verify_url" || true)

            if printf '%s' "$html" | grep -Fq "/assets/$expected_js" && printf '%s' "$html" | grep -Fq "/assets/$expected_css"; then
              js_headers=$(mktemp)
              css_headers=$(mktemp)
              curl --silent --show-error --fail --max-time 30 -D "$js_headers" -o /dev/null "$production_url/assets/$expected_js"
              curl --silent --show-error --fail --max-time 30 -D "$css_headers" -o /dev/null "$production_url/assets/$expected_css"
              if grep -Eiq '^content-type: .*(javascript|text/ecmascript)' "$js_headers" && grep -Eiq '^content-type: .*text/css' "$css_headers"; then
                echo "Cloudflare production now serves the current Vite assets."
                exit 0
              fi
              echo "Production HTML referenced current assets, but asset content types were unexpected."
              echo "JS headers:"
              cat "$js_headers"
              echo "CSS headers:"
              cat "$css_headers"
            fi

            echo "Waiting for Cloudflare production to serve current assets (attempt $attempt/36)."
            sleep 10
          done

          echo "Cloudflare production did not serve the current Vite assets before timeout."
          echo "Expected JS: $expected_js"
          echo "Expected CSS: $expected_css"
          echo "Check Cloudflare build/deploy logs for build_uuid=$build_uuid."
          exit 1
