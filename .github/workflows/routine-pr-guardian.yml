name: Routine PR Guardian

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  guard:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Decide route
        id: decide
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);

            const protectedPatterns = [
              '.github/',
              '.codex/',
              '.agents/',
              '.pre-commit-config.yaml',
              'AGENTS.md',
              'CLAUDE.md',
              'package.json',
              'package-lock.json',
              'pnpm-lock.yaml',
              'yarn.lock',
              '.gitignore',
              'tsconfig',
              'vite.config',
              'docs/product/',
              'docs/architecture/',
              'docs/security/',
              'docs/operations/',
              'tools/',
              'src/application/',
              'src/core/',
              'src/domain/',
              'src/features/',
              'src/persistence/',
              'src/platform/',
              'src/routes/',
              'src/state/',
              'src/ui/',
              'scripts/'
            ];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const protectedMatches = files
              .filter(f =>
                protectedPatterns.some(p =>
                  f.filename === p || f.filename.startsWith(p)
                )
              )
              .map(f => f.filename);

            const touchesProtected = protectedMatches.length > 0;

            const hasManual = labels.includes('manual-review-required');
            const hasRoutine = labels.includes('agent-routine');

            if (hasManual && hasRoutine) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: 'Both agent-routine and manual-review-required are present. This PR stays blocked until labels are corrected.'
              });
            }

            if (touchesProtected && !hasManual) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['manual-review-required']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  'Protected paths were changed, so this PR was routed to manual review.',
                  '',
                  'Matched protected paths:',
                  ...protectedMatches.map(filename => `- \`${filename}\``)
                ].join('\n')
              });
            }

            core.setOutput('protected_paths', protectedMatches.join('\n'));
            core.notice(`Protected path matches: ${protectedMatches.length ? protectedMatches.join(', ') : 'none'}`);

            core.setOutput(
              'routine',
              String(hasRoutine && !hasManual && !touchesProtected)
            );

      - name: Approve routine PR
        if: steps.decide.outputs.routine == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr review ${{ github.event.pull_request.number }} -R ${{ github.repository }} --approve --body "Routine PR auto-approved by guardian workflow."

      - name: Enable auto-merge for routine PR
        if: steps.decide.outputs.routine == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ github.event.pull_request.number }} -R ${{ github.repository }} --auto --squash --delete-branch
